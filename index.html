<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080C0A">
<title>Prospector AI Canarias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;overflow:hidden}
[data-theme="dark"]{--bg:#080C0A;--bg2:#0E1410;--bg3:#141C16;--bg4:#1C261E;--accent:#00E676;--accent2:#69F0AE;--accentDim:rgba(0,230,118,0.1);--accentBorder:rgba(0,230,118,0.22);--amber:#FFB300;--red:#FF5252;--blue:#64B5F6;--purple:#CE93D8;--text:#E8F5E9;--text2:#81C784;--text3:#4A6B4E;--border:#1A2E1C;--border2:#2A4A2C;--card:#0E1410}
[data-theme="light"]{--bg:#F0F4F1;--bg2:#FFFFFF;--bg3:#F5F8F5;--bg4:#EAF0EB;--accent:#00A854;--accent2:#00C762;--accentDim:rgba(0,168,84,0.07);--accentBorder:rgba(0,168,84,0.18);--amber:#E65100;--red:#D32F2F;--blue:#1565C0;--purple:#6A1B9A;--text:#1B2E1D;--text2:#2E7D32;--text3:#78909C;--border:#D4E4D6;--border2:#B8D4BA;--card:#FFFFFF}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;font-size:14px;line-height:1.5;overflow:hidden}
.app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden}
.mono{font-family:'JetBrains Mono',monospace}
.header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.logo{font-size:18px;font-weight:700;color:var(--accent);margin:0;letter-spacing:-0.4px}
.logo::before{content:"‚óè";margin-right:6px;font-size:10px;vertical-align:middle;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.header-actions{display:flex;gap:6px}
.icon-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:10px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.icon-btn:hover{background:var(--bg3);border-color:var(--border2)}
.icon-btn:active{transform:scale(0.93)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg)}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 6px;text-align:center}
.stat-val{display:block;font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--accent);line-height:1.1}
.stat-lbl{display:block;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-top:3px;font-weight:500}
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.tab-content{display:none;padding:14px 16px 20px}
.tab-content.active{display:block}
.mode-selector{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;background:var(--bg2);padding:4px;border-radius:12px;border:1px solid var(--border)}
.mode-btn{background:transparent;border:none;color:var(--text2);padding:10px 6px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;line-height:1.2}
.mode-btn.active{background:var(--accent);color:#001B0A}
.mode-btn.active[data-mode="explore"]{background:var(--blue);color:#fff}
.selectors{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.select-wrap{position:relative}
.select-wrap label{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:4px;font-weight:600}
select{width:100%;background:var(--bg2);color:var(--text);border:1px solid var(--border);padding:11px 32px 11px 12px;border-radius:10px;font-size:14px;font-family:inherit;cursor:pointer;appearance:none;-webkit-appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--accent) 50%),linear-gradient(135deg,var(--accent) 50%,transparent 50%);background-position:calc(100% - 16px) center,calc(100% - 11px) center;background-size:5px 5px;background-repeat:no-repeat;font-weight:500}
select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accentDim)}
.island-badge{display:none;background:var(--accentDim);border:1px solid var(--accentBorder);color:var(--accent);padding:8px 12px;border-radius:10px;font-size:12px;font-weight:600;margin-bottom:10px;text-align:center}
.island-badge.show{display:block}
.search-btn{width:100%;background:var(--accent);color:#001B0A;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;letter-spacing:-0.2px;box-shadow:0 4px 16px var(--accentDim)}
.search-btn.explore{background:var(--blue);color:#fff}
.search-btn:active:not(:disabled){transform:translateY(1px) scale(0.99)}
.search-btn:disabled{opacity:0.6;cursor:wait}
.results{margin-top:16px;display:flex;flex-direction:column;gap:10px}
.loading{text-align:center;padding:40px 20px;color:var(--text2);font-size:13px}
.loading::after{content:"";display:inline-block;width:14px;height:14px;border:2px solid var(--accent);border-right-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.error{background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.3);color:var(--red);padding:14px;border-radius:10px;font-size:13px;text-align:center}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;transition:border-color 0.15s;position:relative}
.card:hover{border-color:var(--border2)}
.card.hot{border-color:var(--accentBorder);box-shadow:0 0 0 1px var(--accentDim)}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.card-name{font-size:15px;font-weight:700;color:var(--text);line-height:1.25;letter-spacing:-0.2px;flex:1}
.hot-badge{background:var(--accent);color:#001B0A;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:800;letter-spacing:0.5px;font-family:'JetBrains Mono',monospace}
.score{background:var(--bg3);border:1px solid var(--border2);padding:6px 10px;border-radius:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;min-width:42px;transition:all 0.15s}
.score:hover{background:var(--bg4);transform:translateY(-1px)}
.score-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--accent);line-height:1}
.score.high .score-val{color:var(--accent)}
.score.mid .score-val{color:var(--amber)}
.score.low .score-val{color:var(--text3)}
.score-lbl{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;font-weight:600}
.score-breakdown{margin-top:8px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;font-size:11px;display:none}
.score-breakdown.show{display:block}
.score-reason{color:var(--text2);font-style:italic;margin-bottom:6px;line-height:1.4}
.score-points{display:grid;gap:3px;color:var(--text3)}
.score-points span{display:flex;justify-content:space-between}
.score-points strong{color:var(--accent)}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.tag{font-size:9px;padding:3px 7px;border-radius:5px;background:var(--bg3);color:var(--text2);font-weight:600;letter-spacing:0.3px;text-transform:uppercase;border:1px solid var(--border)}
.tag.no-web{background:rgba(255,82,82,0.12);color:var(--red);border-color:rgba(255,82,82,0.2)}
.tag.zone{background:var(--accentDim);color:var(--accent);border-color:var(--accentBorder)}
.tag.size{background:rgba(100,181,246,0.1);color:var(--blue);border-color:rgba(100,181,246,0.2)}
.meta{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;font-size:12px;color:var(--text2)}
.meta-row{display:flex;align-items:center;gap:7px}
.meta-row a{color:var(--text2);text-decoration:none;border-bottom:1px dashed var(--border2);padding-bottom:1px}
.meta-row a:hover{color:var(--accent)}
.meta-icon{width:14px;text-align:center;color:var(--text3);font-size:12px}
.rating{display:inline-flex;align-items:center;gap:3px;color:var(--amber);font-weight:600}
.rating-count{color:var(--text3);font-weight:400;font-size:11px}
.wa-preview{background:var(--bg3);border:1px solid var(--border);border-left:3px solid #25D366;padding:8px 10px;border-radius:8px;font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.4;font-style:italic}
.wa-preview strong{color:#25D366;font-style:normal;font-weight:700}
.actions{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:8px}
.actions.mode-b{grid-template-columns:repeat(5,1fr)}
.act-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:9px 4px;border-radius:8px;font-size:13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;transition:all 0.15s}
.act-btn:hover{background:var(--bg4);border-color:var(--border2)}
.act-btn:active{transform:scale(0.93)}
.act-btn.primary{background:var(--accent);color:#001B0A;border-color:var(--accent)}
.act-btn.wa{background:#25D366;color:#fff;border-color:#25D366}
.act-btn.disabled{opacity:0.35;pointer-events:none}
.act-btn span{font-size:9px;font-weight:600;letter-spacing:0.3px}
.status-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.status-btn{background:transparent;border:1px solid var(--border);color:var(--text3);padding:6px 4px;border-radius:7px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
.status-btn:hover{border-color:var(--border2);color:var(--text2)}
.status-btn.active{background:var(--accentDim);border-color:var(--accent);color:var(--accent)}
.status-btn.active[data-status="contacted"]{background:rgba(100,181,246,0.15);border-color:var(--blue);color:var(--blue)}
.status-btn.active[data-status="interested"]{background:rgba(255,179,0,0.15);border-color:var(--amber);color:var(--amber)}
.status-btn.active[data-status="discarded"]{background:rgba(255,82,82,0.12);border-color:var(--red);color:var(--red)}
.address{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.4}
.pipeline-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.pipeline-header h2{margin:0;font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.4px}
.clear-btn{background:transparent;border:1px solid var(--border);color:var(--text3);padding:7px 12px;border-radius:9px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.clear-btn:hover{border-color:var(--red);color:var(--red)}
.pipeline-list{display:flex;flex-direction:column;gap:10px}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;padding:8px 16px 14px;padding-bottom:max(14px,env(safe-area-inset-bottom));z-index:5}
.nav-btn{background:transparent;border:none;color:var(--text3);padding:8px;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit;transition:all 0.15s}
.nav-btn span{font-size:10px;font-weight:600;letter-spacing:0.3px}
.nav-btn.active{color:var(--accent)}
.nav-btn-icon{font-size:18px;line-height:1}
.filters-panel{position:absolute;top:60px;right:16px;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px;z-index:15;min-width:220px;box-shadow:0 10px 30px rgba(0,0,0,0.4);display:none}
.filters-panel.show{display:block}
.filter-item{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:13px;color:var(--text2);cursor:pointer}
.filter-item input{accent-color:var(--accent);width:16px;height:16px;cursor:pointer}
.filter-item:hover{color:var(--text)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--accent);color:#001B0A;padding:10px 18px;border-radius:10px;font-weight:600;font-size:13px;z-index:20;box-shadow:0 4px 20px var(--accentDim);opacity:0;transition:opacity 0.2s,transform 0.2s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.maps-link{font-size:11px;color:var(--blue);text-decoration:none;display:inline-flex;align-items:center;gap:3px;margin-left:6px}
.maps-link:hover{text-decoration:underline}
.ic{display:inline-block;vertical-align:middle;flex-shrink:0}
.meta-icon{display:inline-flex;align-items:center;justify-content:center}
.search-btn{display:flex;align-items:center;justify-content:center;gap:8px}
.mode-btn{display:flex;align-items:center;justify-content:center;gap:6px}
.act-btn{justify-content:center}
.act-btn .ic{margin-bottom:1px}
.nav-btn-icon{display:flex;align-items:center;justify-content:center;height:20px}
.score-val{display:flex;align-items:center;justify-content:center}
.clear-btn{display:inline-flex;align-items:center;gap:6px}
.island-badge{display:none;align-items:center;justify-content:center;gap:8px}
.island-badge.show{display:flex}
.icon-btn .ic{display:block}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media (max-width:380px){.stats{grid-template-columns:repeat(2,1fr)}.stat-val{font-size:16px}}
</style>
</head>

  <main class="main">

            <option value="20">20 leads</option>
            <option value="30">30 leads</option>
          </select>
        </div>
      </div>

      <div class="island-badge" id="islandBadge"></div>

      <button id="searchBtn" class="search-btn"></button>

      <div id="results" class="results"></div>
    </section>

    <section id="pipelineTab" class="tab-content">
      <div class="pipeline-header">
        <h2>Pipeline (<span id="pipelineCount" class="mono">0</span>)</h2>
        <button class="clear-btn" id="clearAllBtn"></button>
      </div>
      <div id="pipelineList" class="pipeline-list"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="search"><span class="nav-btn-icon"></span><span>Buscar</span></button>
    <button class="nav-btn" data-tab="pipeline"><span class="nav-btn-icon"></span><span>Pipeline</span></button>
  </nav>

  <div class="toast" id="toast"></div>
</div>

let _gmapsReady = false;
let _placesService = null;

window.initGoogleMaps = function() {
  _gmapsReady = true;
};

function loadGoogleMaps() {
  return new Promise((resolve, reject) => {
    if (_gmapsReady && window.google && window.google.maps && window.google.maps.places) {
      resolve();
      return;
    }
    if (document.querySelector('script[data-gm]')) {
      const wait = () => (_gmapsReady && window.google && window.google.maps && window.google.maps.places) ? resolve() : setTimeout(wait, 100);
      wait();
      return;
    }
    const s = document.createElement('script');
    s.setAttribute('data-gm', '1');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${GKEY}&libraries=places&language=es&callback=initGoogleMaps`;
    s.async = true;
    s.defer = true;
    s.onerror = () => reject(new Error('Google Maps no disponible'));
    document.head.appendChild(s);
    const wait = () => _gmapsReady ? resolve() : setTimeout(wait, 100);
    wait();
  });
}

function getPlacesService() {
  if (!_placesService) {
    _placesService = new google.maps.places.PlacesService(document.createElement('div'));
  }
  return _placesService;
}

function textSearch(query) {
  return new Promise(resolve => {
    getPlacesService().textSearch({ query, language: 'es' }, (results, status) => {
      resolve({ results: results || [], status });
    });
  });
}

function getDetails(placeId) {
  return new Promise(resolve => {
    getPlacesService().getDetails({
      placeId,
      fields: ['name','formatted_phone_number','website','rating','user_ratings_total','formatted_address','place_id','types','business_status'],
      language: 'es'
    }, (result, status) => resolve(status === 'OK' ? result : null));
  });
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function escapeAttr(str) {
  return escapeHtml(str).replace(/`/g,'&#96;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.remove('show'), 1800);
}

function loadSaved() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    state.savedLeads = raw ? JSON.parse(raw) : [];
  } catch(e) { state.savedLeads = []; }
}

function persistSaved() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.savedLeads)); } catch(e) {}
}

function isSaved(id) {
  return state.savedLeads.some(l => l.id === id);
}

function toggleSave(lead) {
  if (isSaved(lead.id)) {
    state.savedLeads = state.savedLeads.filter(l => l.id !== lead.id);
    showToast('Eliminado del pipeline');
  } else {
    state.savedLeads.push({...lead});
    showToast('Guardado en pipeline');
  }
  persistSaved();
  updateStats();
  if (state.currentTab === 'pipeline') renderPipeline();
  if (state.currentTab === 'search') {
    const leadInList = state.leads.find(l => l.id === lead.id);
    if (leadInList) renderResults();
  }
}

function updateLeadStatus(id, status) {
  const inList = state.leads.find(l => l.id === id);
  if (inList) inList.status = status;
  const inSaved = state.savedLeads.find(l => l.id === id);
  if (inSaved) {
    inSaved.status = status;
    persistSaved();
  } else if (inList && status !== 'new') {
    state.savedLeads.push({...inList});
    persistSaved();
  }
  updateStats();
}

function updateStats() {
  const allTracked = [...state.savedLeads];
  state.leads.forEach(l => {
    if (!allTracked.find(s => s.id === l.id)) allTracked.push(l);
  });
  const total = allTracked.length;
  const hot = allTracked.filter(l => (l.score||0) >= 8).length;
  const contacted = allTracked.filter(l => l.status === 'contacted' || l.status === 'interested').length;
  const interested = allTracked.filter(l => l.status === 'interested').length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statHot').textContent = hot;
  document.getElementById('statContacted').textContent = contacted;
  document.getElementById('statInterested').textContent = interested;
  document.getElementById('pipelineCount').textContent = state.savedLeads.length;
}

function generateGeneric(sectorObj, zone, island, count) {
  const names = FALLBACK_NAMES[sectorObj.id] || [`${sectorObj.name} Canarias`,`${sectorObj.name} Atl√°ntico`,`${sectorObj.name} del Sur`,`${sectorObj.name} Centro`,`${sectorObj.name} Express`];
  const out = [];
  const zoneLabel = zone.startsWith('TODA') ? island : zone;
  for (let i = 0; i < count; i++) {
    const baseName = names[i % names.length];
    const suffix = i >= names.length ? ` ${Math.floor(i/names.length)+1}` : '';
    out.push({
      id: 'gen_' + Date.now() + '_' + i,
      name: baseName + suffix,
      phone: '',
      website: '',
      email: '',
      address: zoneLabel + ', ' + island,
      rating: 0,
      reviews: 0,
      mapsUrl: '',
      zone: zoneLabel,
      island: island,
      sector: sectorObj.id,
      sectorName: sectorObj.name,
      status: 'new',
      generic: true
    });
  }
  return out;
}

function computeFallbackScore(l) {
  let s = 4.5;
  if (l.email) s += 3;
  if (!l.website) s += 2;
  if ((l.reviews||0) > 500) s += 1;
  if ((l.rating||0) >= 4.7) s += 0.5;
  if (!l.phone) s -= 1;
  return Math.max(1, Math.min(10, Math.round(s)));
}

async function doSearch() {
  const islandSel = document.getElementById('islandSelect');
  const zoneSel = document.getElementById('zoneSelect');
  const sectorSel = document.getElementById('sectorSelect');
  const countSel = document.getElementById('countSelect');
  const island = islandSel.value;
  const zone = zoneSel.value;
  const sectorId = sectorSel.value;
  const count = parseInt(countSel.value, 10);
  const sectorObj = SECTORS.find(s => s.id === sectorId);
  const btn = document.getElementById('searchBtn');
  const resultsDiv = document.getElementById('results');

  btn.disabled = true;
  const originalText = btn.textContent;
  btn.textContent = '‚è≥ Buscando...';
  resultsDiv.innerHTML = '<div class="loading">Buscando en Google Maps</div>';

  try {
    await loadGoogleMaps();

    let zonesToSearch = [];
    if (zone.startsWith('TODA')) {
      zonesToSearch = (ZONES[island] || []).filter(z => !z.startsWith('TODA')).slice(0, 6);
    } else {
      zonesToSearch = [zone];
    }

    let allResults = [];
    for (const z of zonesToSearch) {
      const q = `${sectorObj.query} en ${z}, ${island}, Canarias, Espa√±a`;
      const { results } = await textSearch(q);
      allResults = allResults.concat(results);
      if (allResults.length >= count * 2) break;
    }

    const seen = new Set();
    allResults = allResults.filter(r => {
      if (!r.place_id || seen.has(r.place_id)) return false;
      seen.add(r.place_id);
      return true;
    });

    const top = allResults.slice(0, count);
    let leads = [];

    if (top.length > 0) {
      resultsDiv.innerHTML = '<div class="loading">Obteniendo detalles de contacto</div>';
      const detailed = await Promise.all(top.map(async (r) => {
        const d = await getDetails(r.place_id);
        return d || r;
      }));

      leads = detailed.map((d, i) => {
        const website = d.website || '';
        return {
          id: d.place_id || ('gp_' + Date.now() + '_' + i),
          name: d.name || 'Sin nombre',
          phone: d.formatted_phone_number || '',
          website: website,
          email: deriveEmail(website),
          address: d.formatted_address || '',
          rating: d.rating || 0,
          reviews: d.user_ratings_total || 0,
          mapsUrl: d.place_id ? `https://www.google.com/maps/place/?q=place_id:${d.place_id}` : '',
          zone: zone.startsWith('TODA') ? island : zone,
          island: island,
          sector: sectorId,
          sectorName: sectorObj.name,
          sectorEmoji: sectorObj.emoji,
          status: 'new'
        };
      });
    }

    if (leads.length === 0) {
      resultsDiv.innerHTML = '<div class="loading">Sin resultados en Google, generando muestra local</div>';
      leads = generateGeneric(sectorObj, zone, island, count);
    }

    if (state.mode === 'prospects' && leads.length > 0) {
      resultsDiv.innerHTML = '<div class="loading">Puntuando leads con IA</div>';
      await scoreProsects(leads);
      leads.sort((a,b) => (b.score||0) - (a.score||0));
    }

    leads.forEach(l => {
      if (isSaved(l.id)) {
        const saved = state.savedLeads.find(s => s.id === l.id);
        if (saved && saved.status) l.status = saved.status;
      }
    });

    state.leads = leads;
    renderResults();
    updateStats();
  } catch(e) {
    console.error(e);
    resultsDiv.innerHTML = `<div class="error">Error: ${escapeHtml(e.message || 'desconocido')}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
    updateSearchButton();
  }
}

function applyFilters(leads) {
  return leads.filter(l => {
    if (state.filters.noWeb && l.website) return false;
    if (state.filters.hot && (l.score||0) < 8) return false;
    if (state.filters.hasPhone && !l.phone) return false;
    if (state.filters.minRating && (l.rating||0) < 4.5) return false;
    return true;
  });
}

function renderResults() {
  const div = document.getElementById('results');
  const filtered = applyFilters(state.leads);
  if (!state.leads.length) {
    div.innerHTML = '<div class="empty">Busca para ver resultados</div>';
    return;
  }
  if (!filtered.length) {
    div.innerHTML = '<div class="empty">Ning√∫n lead pasa los filtros actuales</div>';
    return;
  }
  if (state.mode === 'prospects') {
    div.innerHTML = filtered.map(l => buildProspectCard(l, false)).join('');
  } else {
    div.innerHTML = filtered.map(l => buildExploreCard(l)).join('');
  }
  attachCardHandlers(div);
}

function renderPipeline() {
  const div = document.getElementById('pipelineList');
  if (!state.savedLeads.length) {
    div.innerHTML = '<div class="empty">A√∫n no has guardado ning√∫n lead</div>';
    return;
  }
  const sorted = [...state.savedLeads].sort((a,b) => (b.score||0) - (a.score||0));
  div.innerHTML = sorted.map(l => buildProspectCard(l, true)).join('');
  attachCardHandlers(div);
}

  const wa = WHATSAPP[l.sector] || 'Hola, soy Javier de Tryvor en Canarias. ¬øTienes 15 min para una demo gratuita?';

    <div class="score-breakdown" data-breakdown="${escapeAttr(l.id)}">

        <span>Sin web <strong>${!l.website ? '+2' : '0'}</strong></span>

        <span>Rating (${(l.rating||0).toFixed(1)}) <strong>${(l.rating||0)>=4.7?'+0.5':'0'}</strong></span>

  `;

  return `

      <div class="card-head">
        <div style="flex:1">
          <div class="card-name">${escapeHtml(l.name)} ${isHot?'<span class="hot-badge mono">HOT</span>':''}</div>
        </div>
        <button class="score ${scoreCls}" data-act="score" data-id="${escapeAttr(l.id)}">
          <span class="score-val mono">${score||'¬∑'}</span>
          <span class="score-lbl">Score</span>
        </button>
      </div>
      <div class="tags">${tags.join('')}</div>
      ${breakdown}
      <div class="meta">
        ${l.phone?`<div class="meta-row"><span class="meta-icon">${icon('phone',13)}</span><a href="tel:${escapeAttr(l.phone)}">${escapeHtml(l.phone)}</a></div>`:''}
        ${l.email?`<div class="meta-row"><span class="meta-icon">${icon('mail',13)}</span><a href="mailto:${escapeAttr(l.email)}">${escapeHtml(l.email)}</a></div>`:''}
        ${l.website?`<div class="meta-row"><span class="meta-icon">${icon('globe',13)}</span><a href="${escapeAttr(l.website)}" target="_blank" rel="noopener">${escapeHtml(shortUrl(l.website))}</a></div>`:''}
        ${l.rating?`<div class="meta-row"><span class="meta-icon">${icon('star',13,true)}</span><span class="rating">${l.rating.toFixed(1)} <span class="rating-count">(${l.reviews||0})</span></span>${l.mapsUrl?`<a class="maps-link" href="${escapeAttr(l.mapsUrl)}" target="_blank" rel="noopener">${icon('pin',11)} Maps</a>`:''}</div>`:''}
        ${l.address?`<div class="address">${escapeHtml(l.address)}</div>`:''}
      </div>
      <div class="wa-preview"><strong>WhatsApp:</strong> ${escapeHtml(waPreview)}</div>
      <div class="actions">
        <button class="act-btn ${!l.phone?'disabled':''}" data-act="call" data-id="${escapeAttr(l.id)}">${icon('phone',16)}<span>Llamar</span></button>
        <button class="act-btn wa ${!l.phone?'disabled':''}" data-act="wa" data-id="${escapeAttr(l.id)}">${icon('message',16)}<span>WhatsApp</span></button>
        <button class="act-btn ${!l.email?'disabled':''}" data-act="email" data-id="${escapeAttr(l.id)}">${icon('mail',16)}<span>Email</span></button>
        <button class="act-btn" data-act="copy" data-id="${escapeAttr(l.id)}">${icon('copy',16)}<span>Copiar</span></button>
        <button class="act-btn ${saved?'primary':''}" data-act="save" data-id="${escapeAttr(l.id)}">${icon('bookmark',16,saved)}<span>${saved?'Quitar':'Guardar'}</span></button>
      </div>
      <div class="status-row">

function shortUrl(u) {
  try {
    const url = new URL(u);
    return url.hostname.replace(/^www\./,'');
  } catch(e) { return u; }
}

function findLead(id) {
  return state.leads.find(l => l.id === id) || state.savedLeads.find(l => l.id === id);
}

function attachCardHandlers(container) {
  container.querySelectorAll('[data-act]').forEach(el => {
    el.onclick = (ev) => {
      ev.preventDefault();
      const act = el.dataset.act;
      const id = el.dataset.id;
      const l = findLead(id);
      if (!l) return;
      switch (act) {
        case 'score': {
          const bd = container.querySelector(`[data-breakdown="${CSS.escape(id)}"]`);
          if (bd) bd.classList.toggle('show');
          break;
        }
        case 'call':
          if (l.phone) window.location.href = 'tel:' + l.phone.replace(/\s/g,'');
          break;
        case 'wa': {
          if (!l.phone) return;
          const clean = l.phone.replace(/[^\d]/g,'');
          const withCode = clean.startsWith('34') ? clean : ('34' + clean);
          const msg = WHATSAPP[l.sector] || 'Hola, soy Javier de Tryvor en Canarias. ¬øTienes 15 min para una demo gratuita?';
          window.open(`https://wa.me/${withCode}?text=${encodeURIComponent(msg)}`, '_blank');
          break;
        }
        case 'email':
          if (l.email) window.location.href = 'mailto:' + l.email;
          break;
        case 'web':
          if (l.website) window.open(l.website, '_blank');
          break;
        case 'maps':
          if (l.mapsUrl) window.open(l.mapsUrl, '_blank');
          break;
        case 'copy': {
          const txt = `${l.name}\n${l.phone||''}\n${l.email||''}\n${l.website||''}\n${l.address||''}`;
          navigator.clipboard.writeText(txt).then(() => showToast('Copiado al portapapeles'));
          break;
        }
        case 'save':
          toggleSave(l);
          break;
        case 'status':
          updateLeadStatus(id, el.dataset.status);
          if (state.currentTab === 'pipeline') renderPipeline();
          else renderResults();
          break;
      }
    };
  });
}

function exportCSV() {
  const all = state.currentTab === 'pipeline' ? state.savedLeads : state.leads;
  if (!all.length) { showToast('Nada que exportar'); return; }
  const headers = ['Nombre','Tel√©fono','Email','Web','Direcci√≥n','Zona','Sector','Score','Status','Rating','Rese√±as'];
  const rows = all.map(l => [
    l.name||'', l.phone||'', l.email||'', l.website||'', l.address||'',
    l.zone||'', l.sectorName||l.sector||'', l.score||'', l.status||'', l.rating||'', l.reviews||''
  ]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['Ôªø' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `prospector_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('CSV descargado');
}

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').innerHTML = theme === 'dark' ? icon('moon',18) : icon('sun',18);
  document.querySelector('meta[name="theme-color"]').setAttribute('content', theme === 'dark' ? '#080C0A' : '#F0F4F1');
  try { localStorage.setItem(THEME_KEY, theme); } catch(e) {}
}

function fillStaticIcons() {
  document.getElementById('csvBtn').innerHTML = icon('download',18);
  document.getElementById('filterBtn').innerHTML = icon('sliders',18);
  document.getElementById('clearAllBtn').innerHTML = `${icon('trash',14)}<span>Limpiar todo</span>`;
  const modeProspects = document.querySelector('.mode-btn[data-mode="prospects"]');
  const modeExplore = document.querySelector('.mode-btn[data-mode="explore"]');
  if (modeProspects) modeProspects.innerHTML = `${icon('target',16)}<span>Clientes potenciales</span>`;
  if (modeExplore) modeExplore.innerHTML = `${icon('map',16)}<span>Explorar empresas</span>`;
  const navSearch = document.querySelector('.nav-btn[data-tab="search"] .nav-btn-icon');
  const navPipeline = document.querySelector('.nav-btn[data-tab="pipeline"] .nav-btn-icon');
  if (navSearch) navSearch.innerHTML = icon('search',20);
  if (navPipeline) navPipeline.innerHTML = icon('list',20);
}

function switchTab(tab) {
  state.currentTab = tab;
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tab + 'Tab').classList.add('active');
  document.querySelector(`.nav-btn[data-tab="${tab}"]`).classList.add('active');
  if (tab === 'pipeline') renderPipeline();
  updateStats();
}

function init() {
  loadSaved();
  try {
    const saved = localStorage.getItem(THEME_KEY);
    setTheme(saved || 'dark');
  } catch(e) { setTheme('dark'); }

  populateIslands();
  populateZones();
  populateSectors();
  fillStaticIcons();
  updateSearchButton();
  updateStats();

  document.getElementById('islandSelect').addEventListener('change', populateZones);
  document.getElementById('zoneSelect').addEventListener('change', updateIslandBadge);

  document.querySelectorAll('.mode-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      state.mode = b.dataset.mode;
      updateSearchButton();
      if (state.leads.length) renderResults();
    });
  });

  document.querySelectorAll('.nav-btn').forEach(b => {
    b.addEventListener('click', () => switchTab(b.dataset.tab));
  });

  document.getElementById('searchBtn').addEventListener('click', doSearch);

  document.getElementById('themeBtn').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    setTheme(cur === 'dark' ? 'light' : 'dark');
  });

  document.getElementById('csvBtn').addEventListener('click', exportCSV);

  document.getElementById('filterBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('filtersPanel').classList.toggle('show');
  });

  document.addEventListener('click', (e) => {
    const panel = document.getElementById('filtersPanel');
    if (!panel.contains(e.target) && e.target.id !== 'filterBtn') {
      panel.classList.remove('show');
    }
  });

  ['filterNoWeb','filterHot','filterHasPhone','filterMinRating'].forEach(id => {
    document.getElementById(id).addEventListener('change', (e) => {
      const key = id.replace('filter','').replace(/^./, c => c.toLowerCase());
      state.filters[key] = e.target.checked;
      if (state.currentTab === 'search') renderResults();
      else renderPipeline();
    });
  });

  document.getElementById('clearAllBtn').addEventListener('click', () => {
    if (!state.savedLeads.length) return;
    if (confirm('¬øEliminar todos los leads guardados?')) {
      state.savedLeads = [];
      persistSaved();
      renderPipeline();
      updateStats();
      showToast('Pipeline vaciado');
    }
  });

  document.getElementById('results').innerHTML = '<div class="empty">Selecciona zona y sector, luego pulsa buscar</div>';
}

document.addEventListener('DOMContentLoaded', init);
